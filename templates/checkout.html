<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Checkout Complete</h2>

    <div class="card">
        <p><strong>Total spent:</strong> {{ total }} gold</p>
        <p><strong>Remaining balance:</strong> {{ balance }} gold</p>
    </div>

    {% if flag %}
    <div class="card">
        <h3>🏆 Reward Unlocked</h3>
        <p>{{ flag }}</p>
    </div>
    {% endif %}

    <a href="/shop">Back to shop</a>

</div>

</body>
</html>
